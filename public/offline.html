<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're offline — TradeSucro</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAF9F6;
      color: #1C1B19;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 360px; }
    .mark {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #1C1B19;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mark svg { width: 26px; height: 26px; }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
    p { font-size: 14px; color: #6B6660; line-height: 1.5; margin: 0 0 20px; }
    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: #1C1B19;
      color: #FAF9F6;
      border: none;
      border-radius: 6px;
      padding: 12px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L18 8.5L14.5 9.5L12 12L9.5 9.5L6 8.5L12 2Z" fill="#B8933D"/>
        <path d="M6 8.5L9.5 9.5L12 12L12 22L6 15.5V8.5Z" fill="#B8933D" fill-opacity="0.8"/>
        <path d="M18 8.5L14.5 9.5L12 12L12 22L18 15.5V8.5Z" fill="#B8933D" fill-opacity="0.6"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>TradeSucro couldn't reach the network. Check your connection — anything you already opened today may still be available.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
